<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plataforma centralizada de vacantes laborales y prácticas profesionales para estudiantes y empresas." />
    <title>Bolsa de Trabajo y Prácticas Profesionales</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Estilos propios — sistema de diseño -->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app" role="main">
      <!-- Estado de carga inicial -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:.3">
          <rect width="40" height="40" rx="8" fill="#1d4ed8"/>
          <path d="M10 28V16l10-6 10 6v12" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
          <rect x="15" y="20" width="10" height="8" rx="1" stroke="#fff" stroke-width="2"/>
        </svg>
        <p style="font-family:Inter,sans-serif;font-size:.875rem;color:#94a3b8;letter-spacing:.02em;">Cargando plataforma...</p>
      </div>
    </div>

    <!-- Punto de entrada JavaScript -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
